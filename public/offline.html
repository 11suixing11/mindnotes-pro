<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - MindNotes Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      color: white;
      max-width: 400px;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    
    p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
      opacity: 0.9;
    }
    
    .status {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    
    .status-item:last-child {
      margin-bottom: 0;
    }
    
    .status-label {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .status-value {
      font-weight: 600;
    }
    
    button {
      background: white;
      color: #667eea;
      border: none;
      padding: 12px 30px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin: 5px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    
    button.secondary {
      background: rgba(255, 255, 255, 0.3);
      color: white;
    }
    
    .tips {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📝</div>
    
    <h1>MindNotes Pro</h1>
    
    <div class="status">
      <div class="status-item">
        <span class="status-label">网络状态</span>
        <span class="status-value" id="network-status">❌ 离线</span>
      </div>
      <div class="status-item">
        <span class="status-label">缓存状态</span>
        <span class="status-value" id="cache-status">✅ 可用</span>
      </div>
    </div>
    
    <p>
      当前处于离线状态<br>
      已缓存的笔记仍然可以访问
    </p>
    
    <div>
      <button onclick="window.location.reload()">🔄 重试连接</button>
      <button class="secondary" onclick="goHome()">🏠 返回主页</button>
    </div>
    
    <div class="tips">
      <p>💡 提示：</p>
      <p>• 检查网络连接</p>
      <p>• 已缓存的内容仍可访问</p>
      <p>• 网络恢复后自动同步</p>
    </div>
  </div>
  
  <script>
    // 更新网络状态
    function updateStatus() {
      const online = navigator.onLine
      document.getElementById('network-status').textContent = online ? '✅ 在线' : '❌ 离线'
      document.getElementById('network-status').style.color = online ? '#4ade80' : '#f87171'
    }
    
    // 监听网络变化
    window.addEventListener('online', updateStatus)
    window.addEventListener('offline', updateStatus)
    
    // 初始状态
    updateStatus()
    
    // 返回主页
    function goHome() {
      window.location.href = '/'
    }
    
    // 检查缓存
    if ('caches' in window) {
      caches.keys().then(names => {
        console.log('Available caches:', names)
      })
    }
  </script>
</body>
</html>
