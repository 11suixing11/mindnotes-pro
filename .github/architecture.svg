<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">
  <rect width="700" height="180" fill="#f5f0e8" rx="12"/>

  <!-- App.tsx -->
  <rect x="20" y="20" width="100" height="140" rx="8" fill="white" opacity="0.8" stroke="rgba(120,100,70,0.12)" stroke-width="1"/>
  <text x="70" y="42" font-family="monospace" font-size="10" font-weight="700" fill="#c47a5a" text-anchor="middle">App.tsx</text>
  <line x1="30" y1="50" x2="110" y2="50" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <text x="70" y="68" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">Canvas</text>
  <text x="70" y="82" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">Toolbar</text>
  <text x="70" y="96" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">Sidebar</text>
  <text x="70" y="116" font-family="system-ui" font-size="8" fill="#9c8e7a" text-anchor="middle">Layout</text>

  <!-- Arrow -->
  <line x1="125" y1="90" x2="155" y2="90" stroke="#c47a5a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#c47a5a"/></marker></defs>

  <!-- Canvas.tsx -->
  <rect x="160" y="20" width="120" height="140" rx="8" fill="white" opacity="0.8" stroke="rgba(120,100,70,0.12)" stroke-width="1"/>
  <text x="220" y="42" font-family="monospace" font-size="10" font-weight="700" fill="#c47a5a" text-anchor="middle">Canvas.tsx</text>
  <line x1="170" y1="50" x2="270" y2="50" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <text x="220" y="68" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">drawElement()</text>
  <text x="220" y="82" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">hitTest()</text>
  <text x="220" y="96" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">hitHandle()</text>
  <text x="220" y="110" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">Mouse/Touch</text>
  <text x="220" y="130" font-family="system-ui" font-size="8" fill="#9c8e7a" text-anchor="middle">720 lines</text>

  <!-- Arrow -->
  <line x1="285" y1="90" x2="315" y2="90" stroke="#c47a5a" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- appStore.ts -->
  <rect x="320" y="20" width="120" height="140" rx="8" fill="white" opacity="0.8" stroke="rgba(120,100,70,0.12)" stroke-width="1"/>
  <text x="380" y="42" font-family="monospace" font-size="10" font-weight="700" fill="#c47a5a" text-anchor="middle">appStore.ts</text>
  <line x1="330" y1="50" x2="430" y2="50" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <text x="380" y="68" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">elements[]</text>
  <text x="380" y="82" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">docs[]</text>
  <text x="380" y="96" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">folders[]</text>
  <text x="380" y="110" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">undo/redo</text>
  <text x="380" y="130" font-family="system-ui" font-size="8" fill="#9c8e7a" text-anchor="middle">Zustand</text>

  <!-- Arrow -->
  <line x1="445" y1="90" x2="475" y2="90" stroke="#c47a5a" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- storage.ts -->
  <rect x="480" y="20" width="100" height="140" rx="8" fill="white" opacity="0.8" stroke="rgba(120,100,70,0.12)" stroke-width="1"/>
  <text x="530" y="42" font-family="monospace" font-size="10" font-weight="700" fill="#c47a5a" text-anchor="middle">storage.ts</text>
  <line x1="490" y1="50" x2="570" y2="50" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <text x="530" y="68" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">openDB()</text>
  <text x="530" y="82" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">get / put</text>
  <text x="530" y="96" font-family="system-ui" font-size="9" fill="#5c4f3d" text-anchor="middle">getAll / del</text>
  <text x="530" y="130" font-family="system-ui" font-size="8" fill="#9c8e7a" text-anchor="middle">IndexedDB</text>

  <!-- Arrow -->
  <line x1="585" y1="90" x2="615" y2="90" stroke="#c47a5a" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- types.ts -->
  <rect x="620" y="40" width="60" height="100" rx="8" fill="white" opacity="0.8" stroke="rgba(120,100,70,0.12)" stroke-width="1"/>
  <text x="650" y="62" font-family="monospace" font-size="9" font-weight="700" fill="#c47a5a" text-anchor="middle">types</text>
  <line x1="628" y1="70" x2="672" y2="70" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <text x="650" y="86" font-family="system-ui" font-size="8" fill="#5c4f3d" text-anchor="middle">Stroke</text>
  <text x="650" y="100" font-family="system-ui" font-size="8" fill="#5c4f3d" text-anchor="middle">Shape</text>
  <text x="650" y="114" font-family="system-ui" font-size="8" fill="#5c4f3d" text-anchor="middle">Text</text>
  <text x="650" y="128" font-family="system-ui" font-size="8" fill="#5c4f3d" text-anchor="middle">Image</text>
</svg>
