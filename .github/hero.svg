<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#ece5d8"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#806040" flood-opacity="0.08"/>
    </filter>
    <filter id="panel-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#806040" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Browser frame -->
  <rect width="900" height="520" rx="12" fill="#2c2416"/>
  <!-- Browser topbar -->
  <rect x="0" y="0" width="900" height="32" rx="12" fill="#3a3228"/>
  <rect x="0" y="20" width="900" height="12" fill="#3a3228"/>
  <!-- Traffic lights -->
  <circle cx="18" cy="16" r="6" fill="#e85d4a"/>
  <circle cx="36" cy="16" r="6" fill="#e8a64a"/>
  <circle cx="54" cy="16" r="6" fill="#6a9c5a"/>
  <!-- URL bar -->
  <rect x="180" y="8" width="540" height="20" rx="10" fill="#2c2416"/>
  <text x="450" y="22" font-family="system-ui, sans-serif" font-size="10" fill="#9c8e7a" text-anchor="middle">11suixing11.github.io/mindnotes-pro</text>

  <!-- App container -->
  <rect x="4" y="36" width="892" height="480" rx="0" fill="#f5f0e8"/>

  <!-- Left sidebar (folder tree) -->
  <rect x="4" y="36" width="220" height="480" fill="#faf7f0" filter="url(#card-shadow)"/>
  <line x1="224" y1="36" x2="224" y2="516" stroke="rgba(120,100,70,0.1)" stroke-width="1"/>

  <!-- Sidebar header -->
  <circle cx="28" cy="58" r="10" fill="#c47a5a"/>
  <text x="28" y="62" font-family="system-ui" font-size="10" font-weight="700" fill="white" text-anchor="middle">M</text>
  <text x="44" y="58" font-family="system-ui" font-size="11" font-weight="700" fill="#2c2416">MindNotes</text>
  <text x="115" y="58" font-family="system-ui" font-size="8" fill="#c8bba8">v2.2</text>

  <!-- Sidebar buttons -->
  <rect x="16" y="76" width="96" height="26" rx="8" fill="#c47a5a"/>
  <text x="64" y="93" font-family="system-ui" font-size="10" font-weight="600" fill="white" text-anchor="middle">+ 新画布</text>
  <rect x="118" y="76" width="96" height="26" rx="8" fill="none" stroke="rgba(120,100,70,0.12)" stroke-width="1"/>
  <text x="166" y="93" font-family="system-ui" font-size="10" font-weight="600" fill="#5c4f3d" text-anchor="middle">+ 文件夹</text>

  <!-- Folder -->
  <text x="22" y="128" font-family="system-ui" font-size="8" fill="#c8bba8">▸</text>
  <text x="34" y="128" font-family="system-ui" font-size="10" font-weight="600" fill="#5c4f3d">我的笔记</text>
  <text x="190" y="128" font-family="system-ui" font-size="8" fill="#c8bba8">3</text>

  <!-- Active doc -->
  <rect x="12" y="136" width="200" height="44" rx="8" fill="rgba(196,122,90,0.08)"/>
  <rect x="20" y="144" width="28" height="28" rx="6" fill="#c47a5a"/>
  <text x="34" y="162" font-family="system-ui" font-size="11" font-weight="700" fill="white" text-anchor="middle">12</text>
  <text x="56" y="155" font-family="system-ui" font-size="11" font-weight="600" fill="#c47a5a">课堂笔记</text>
  <text x="56" y="170" font-family="system-ui" font-size="8" fill="#c8bba8">05-08 19:55</text>

  <!-- Other docs -->
  <rect x="20" y="188" width="28" height="28" rx="6" fill="rgba(120,100,70,0.08)"/>
  <text x="34" y="206" font-family="system-ui" font-size="11" font-weight="700" fill="#9c8e7a" text-anchor="middle">5</text>
  <text x="56" y="201" font-family="system-ui" font-size="11" fill="#5c4f3d">项目草图</text>
  <text x="56" y="216" font-family="system-ui" font-size="8" fill="#c8bba8">05-07 14:20</text>

  <rect x="20" y="228" width="28" height="28" rx="6" fill="rgba(120,100,70,0.08)"/>
  <text x="34" y="246" font-family="system-ui" font-size="11" font-weight="700" fill="#9c8e7a" text-anchor="middle">3</text>
  <text x="56" y="241" font-family="system-ui" font-size="11" fill="#5c4f3d">会议记录</text>
  <text x="56" y="256" font-family="system-ui" font-size="8" fill="#c8bba8">05-06 10:30</text>

  <!-- Sidebar footer -->
  <line x1="16" y1="480" x2="208" y2="480" stroke="rgba(120,100,70,0.06)" stroke-width="1"/>
  <text x="112" y="500" font-family="system-ui" font-size="9" fill="#c8bba8" text-anchor="middle">3 画布 · IndexedDB</text>

  <!-- Canvas area background -->
  <rect x="224" y="36" width="672" height="480" fill="#faf7f0"/>

  <!-- Canvas toolbar (left) -->
  <rect x="236" y="100" width="42" height="300" rx="12" fill="rgba(250,247,240,0.9)" filter="url(#panel-shadow)"/>
  <!-- Tool buttons -->
  <rect x="242" y="108" width="30" height="30" rx="8" fill="#c47a5a"/>
  <text x="257" y="128" font-family="system-ui" font-size="9" font-weight="700" fill="white" text-anchor="middle">1</text>
  <rect x="242" y="144" width="30" height="30" rx="8" fill="none" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <rect x="242" y="180" width="30" height="30" rx="8" fill="none" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <rect x="242" y="216" width="30" height="30" rx="8" fill="none" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <line x1="248" y1="256" x2="266" y2="256" stroke="rgba(120,100,70,0.06)" stroke-width="1"/>
  <rect x="242" y="264" width="30" height="30" rx="8" fill="none" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <rect x="242" y="300" width="30" height="30" rx="8" fill="none" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <rect x="242" y="336" width="30" height="30" rx="8" fill="none" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <rect x="242" y="372" width="30" height="30" rx="8" fill="none" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>

  <!-- Top property bar -->
  <rect x="290" y="46" width="520" height="34" rx="10" fill="rgba(250,247,240,0.9)" filter="url(#panel-shadow)"/>
  <!-- Color dots -->
  <circle cx="310" cy="63" r="6" fill="#2c2416"/>
  <circle cx="326" cy="63" r="6" fill="#c45a5a"/>
  <circle cx="342" cy="63" r="6" fill="#c47a3a"/>
  <circle cx="358" cy="63" r="6" fill="#6a9c5a"/>
  <circle cx="374" cy="63" r="6" fill="#5a8a9c"/>
  <circle cx="390" cy="63" r="6" fill="#8a6a9c"/>
  <circle cx="406" cy="63" r="6" fill="#9c5a7a"/>
  <line x1="420" y1="55" x2="420" y2="71" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <!-- Size dots -->
  <circle cx="436" cy="63" r="3" fill="rgba(120,100,70,0.2)"/>
  <circle cx="452" cy="63" r="4" fill="rgba(120,100,70,0.35)"/>
  <circle cx="470" cy="63" r="5" fill="#c47a5a"/>
  <circle cx="490" cy="63" r="6" fill="rgba(120,100,70,0.2)"/>
  <line x1="505" y1="55" x2="505" y2="71" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <!-- Background swatch -->
  <rect x="515" y="55" width="16" height="16" rx="3" fill="#faf7f0" stroke="rgba(120,100,70,0.12)" stroke-width="1"/>
  <line x1="540" y1="55" x2="540" y2="71" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <!-- Export button -->
  <rect x="720" y="52" width="68" height="24" rx="8" fill="#c47a5a"/>
  <text x="754" y="68" font-family="system-ui" font-size="10" font-weight="600" fill="white" text-anchor="middle">导出 ▾</text>

  <!-- Grid dots on canvas -->
  <g opacity="0.1">
    <pattern id="canvas-dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="#9c8e7a"/>
    </pattern>
    <rect x="290" y="90" width="596" height="416" fill="url(#canvas-dots)"/>
  </g>

  <!-- Drawing content on canvas -->
  <!-- Stroke: curved line -->
  <path d="M380,200 Q440,150 520,190 Q600,230 660,170" fill="none" stroke="#2c2416" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Stroke: highlight -->
  <path d="M420,260 Q500,220 580,270" fill="none" stroke="#c45a5a" stroke-width="10" stroke-linecap="round" opacity="0.25"/>

  <!-- Shape: rectangle -->
  <rect x="360" y="300" width="130" height="80" rx="4" fill="none" stroke="#6a9c5a" stroke-width="1.5"/>

  <!-- Shape: circle -->
  <circle cx="600" cy="340" r="45" fill="none" stroke="#5a8a9c" stroke-width="1.5"/>

  <!-- Arrow -->
  <line x1="500" y1="340" x2="545" y2="340" stroke="#8a6a9c" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="537,333 545,340 537,347" fill="none" stroke="#8a6a9c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text block -->
  <rect x="700" y="160" width="160" height="80" rx="8" fill="rgba(250,247,240,0.92)" stroke="rgba(196,122,90,0.15)" stroke-width="1"/>
  <text x="716" y="184" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#2c2416">Hello, MindNotes!</text>
  <text x="716" y="204" font-family="system-ui, sans-serif" font-size="10" fill="#9c8e7a">画布上直接打字</text>
  <text x="716" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#9c8e7a">可拖拽、可缩放</text>

  <!-- Minimap -->
  <rect x="760" y="380" width="120" height="80" rx="8" fill="rgba(236,229,216,0.7)" stroke="rgba(120,100,70,0.1)" stroke-width="1"/>
  <rect x="380" y="190" width="6" height="4" fill="#9c8e7a" opacity="0.5" transform="translate(340,180) scale(0.14)"/>
  <rect x="770" y="390" width="30" height="20" rx="2" fill="none" stroke="#c47a5a" stroke-width="1"/>

  <!-- Status bar -->
  <rect x="290" y="480" width="200" height="22" rx="7" fill="rgba(250,247,240,0.85)" filter="url(#panel-shadow)"/>
  <circle cx="304" cy="491" r="3.5" fill="#6a9c5a"/>
  <text x="314" y="495" font-family="system-ui" font-size="9" fill="#9c8e7a">画笔</text>
  <line x1="338" y1="486" x2="338" y2="496" stroke="rgba(120,100,70,0.08)" stroke-width="0.5"/>
  <text x="346" y="495" font-family="system-ui" font-size="9" fill="#9c8e7a">12 元素</text>
  <line x1="390" y1="486" x2="390" y2="496" stroke="rgba(120,100,70,0.08)" stroke-width="0.5"/>
  <text x="398" y="495" font-family="system-ui" font-size="9" fill="#9c8e7a">3 画布</text>
  <line x1="432" y1="486" x2="432" y2="496" stroke="rgba(120,100,70,0.08)" stroke-width="0.5"/>
  <text x="440" y="495" font-family="system-ui" font-size="9" fill="#c47a5a" font-weight="600">100%</text>

  <!-- Hints bar -->
  <rect x="620" y="480" width="260" height="22" rx="7" fill="rgba(250,247,240,0.85)" filter="url(#panel-shadow)"/>
  <text x="636" y="495" font-family="system-ui" font-size="8" fill="#c8bba8">Ctrl+Z 撤销 · 滚轮缩放 · 0-8 工具 · Del 删除选中</text>
</svg>
