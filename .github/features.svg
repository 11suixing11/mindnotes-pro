<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <rect width="800" height="200" fill="#f5f0e8" rx="12"/>

  <g transform="translate(20, 20)">
    <rect width="175" height="160" rx="10" fill="white" opacity="0.7"/>
    <circle cx="45" cy="40" r="18" fill="rgba(196,122,90,0.1)"/>
    <text x="45" y="46" font-family="system-ui" font-size="18" text-anchor="middle">✏️</text>
    <text x="88" y="40" font-family="system-ui" font-size="12" font-weight="700" fill="#2c2416">6 Brushes</text>
    <text x="88" y="55" font-family="system-ui" font-size="10" fill="#9c8e7a">6种笔刷</text>
    <text x="20" y="80" font-family="system-ui" font-size="9" fill="#5c4f3d">Pen · Highlighter</text>
    <text x="20" y="95" font-family="system-ui" font-size="9" fill="#5c4f3d">Pencil · Calligraphy</text>
    <text x="20" y="110" font-family="system-ui" font-size="9" fill="#5c4f3d">Dashed · Glow</text>
    <text x="20" y="130" font-family="system-ui" font-size="8" fill="#c8bba8">Smooth Bézier curves</text>
    <text x="20" y="143" font-family="system-ui" font-size="8" fill="#c8bba8">平滑贝塞尔曲线</text>
  </g>

  <g transform="translate(210, 20)">
    <rect width="175" height="160" rx="10" fill="white" opacity="0.7"/>
    <circle cx="45" cy="40" r="18" fill="rgba(106,156,90,0.1)"/>
    <text x="45" y="46" font-family="system-ui" font-size="18" text-anchor="middle">🔧</text>
    <text x="88" y="40" font-family="system-ui" font-size="12" font-weight="700" fill="#2c2416">9 Tools</text>
    <text x="88" y="55" font-family="system-ui" font-size="10" fill="#9c8e7a">9种工具</text>
    <text x="20" y="80" font-family="system-ui" font-size="9" fill="#5c4f3d">Select · Pen · Eraser</text>
    <text x="20" y="95" font-family="system-ui" font-size="9" fill="#5c4f3d">Pan · Rect · Circle</text>
    <text x="20" y="110" font-family="system-ui" font-size="9" fill="#5c4f3d">Text · Line · Arrow</text>
    <text x="20" y="130" font-family="system-ui" font-size="8" fill="#c8bba8">Keyboard shortcuts 0-8</text>
    <text x="20" y="143" font-family="system-ui" font-size="8" fill="#c8bba8">快捷键 0-8 一键切换</text>
  </g>

  <g transform="translate(400, 20)">
    <rect width="175" height="160" rx="10" fill="white" opacity="0.7"/>
    <circle cx="45" cy="40" r="18" fill="rgba(90,138,156,0.1)"/>
    <text x="45" y="46" font-family="system-ui" font-size="18" text-anchor="middle">💾</text>
    <text x="88" y="40" font-family="system-ui" font-size="12" font-weight="700" fill="#2c2416">6 Formats</text>
    <text x="88" y="55" font-family="system-ui" font-size="10" fill="#9c8e7a">6种导出</text>
    <text x="20" y="80" font-family="system-ui" font-size="9" fill="#5c4f3d">PNG · JPG · PDF</text>
    <text x="20" y="95" font-family="system-ui" font-size="9" fill="#5c4f3d">SVG · Word · JSON</text>
    <text x="20" y="110" font-family="system-ui" font-size="9" fill="#5c4f3d">DPI-aware rendering</text>
    <text x="20" y="130" font-family="system-ui" font-size="8" fill="#c8bba8">One-click export</text>
    <text x="20" y="143" font-family="system-ui" font-size="8" fill="#c8bba8">一键导出，所见即所得</text>
  </g>

  <g transform="translate(590, 20)">
    <rect width="175" height="160" rx="10" fill="white" opacity="0.7"/>
    <circle cx="45" cy="40" r="18" fill="rgba(138,106,156,0.1)"/>
    <text x="45" y="46" font-family="system-ui" font-size="18" text-anchor="middle">📁</text>
    <text x="88" y="40" font-family="system-ui" font-size="12" font-weight="700" fill="#2c2416">Multi-Canvas</text>
    <text x="88" y="55" font-family="system-ui" font-size="10" fill="#9c8e7a">多画布管理</text>
    <text x="20" y="80" font-family="system-ui" font-size="9" fill="#5c4f3d">Folder tree</text>
    <text x="20" y="95" font-family="system-ui" font-size="9" fill="#5c4f3d">Create / Switch / Delete</text>
    <text x="20" y="110" font-family="system-ui" font-size="9" fill="#5c4f3d">Auto-save to IndexedDB</text>
    <text x="20" y="130" font-family="system-ui" font-size="8" fill="#c8bba8">Data never leaves browser</text>
    <text x="20" y="143" font-family="system-ui" font-size="8" fill="#c8bba8">数据永不出浏览器</text>
  </g>
