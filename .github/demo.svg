<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8"/>
      <stop offset="50%" style="stop-color:#f0ebe0"/>
      <stop offset="100%" style="stop-color:#ece5d8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d48a6a"/>
      <stop offset="100%" style="stop-color:#c47a5a"/>
    </linearGradient>
    <linearGradient id="sidebar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(250,247,240,0.9)"/>
      <stop offset="100%" style="stop-color:rgba(245,240,232,0.85)"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#806040" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#806040" flood-opacity="0.05"/>
    </filter>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="paper"/>
    </filter>
    <clipPath id="canvas-clip">
      <rect x="170" y="50" width="610" height="350" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)" rx="16"/>

  <!-- Paper texture -->
  <rect width="800" height="420" rx="16" fill="url(#bg)" filter="url(#paper)" opacity="0.3"/>

  <!-- Sidebar -->
  <rect x="16" y="50" width="140" height="350" rx="12" fill="url(#sidebar)" filter="url(#shadow1)"/>
  <rect x="24" y="62" width="22" height="22" rx="6" fill="var(--accent, #c47a5a)"/>
  <text x="35" y="78" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">M</text>
  <text x="52" y="78" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#2c2416">MindNotes</text>

  <!-- Sidebar buttons -->
  <rect x="24" y="92" width="56" height="24" rx="7" fill="#c47a5a"/>
  <text x="52" y="108" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">+ 新画布</text>
  <rect x="86" y="92" width="56" height="24" rx="7" fill="none" stroke="rgba(120,100,70,0.15)" stroke-width="1"/>
  <text x="114" y="108" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#5c4f3d" text-anchor="middle">+ 文件夹</text>

  <!-- Sidebar folder -->
  <text x="32" y="138" font-family="system-ui, sans-serif" font-size="8" fill="#c8bba8">▶</text>
  <text x="44" y="138" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#5c4f3d">我的笔记</text>
  <text x="120" y="138" font-family="system-ui, sans-serif" font-size="8" fill="#c8bba8">1</text>

  <!-- Sidebar doc item -->
  <rect x="24" y="148" width="124" height="32" rx="7" fill="rgba(196,122,90,0.06)"/>
  <rect x="30" y="154" width="20" height="20" rx="5" fill="#c47a5a"/>
  <text x="40" y="168" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="56" y="164" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#c47a5a">欢迎使用</text>
  <text x="56" y="176" font-family="system-ui, sans-serif" font-size="8" fill="#c8bba8">05-08 19:55</text>

  <!-- Sidebar another doc -->
  <rect x="30" y="186" width="20" height="20" rx="5" fill="rgba(120,100,70,0.1)"/>
  <text x="40" y="200" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#9c8e7a" text-anchor="middle">5</text>
  <text x="56" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#5c4f3d">课堂笔记</text>
  <text x="56" y="208" font-family="system-ui, sans-serif" font-size="8" fill="#c8bba8">05-07 14:20</text>

  <!-- Sidebar footer -->
  <line x1="24" y1="380" x2="148" y2="380" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <text x="86" y="395" font-family="system-ui, sans-serif" font-size="9" fill="#c8bba8" text-anchor="middle">2 画布</text>

  <!-- Canvas area -->
  <rect x="170" y="50" width="610" height="350" rx="12" fill="#faf7f0" filter="url(#shadow1)"/>

  <!-- Grid dots on canvas -->
  <g opacity="0.12" clip-path="url(#canvas-clip)">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.6" fill="#9c8e7a"/>
    </pattern>
    <rect x="170" y="50" width="610" height="350" fill="url(#dots)"/>
  </g>

  <!-- Toolbar sidebar -->
  <rect x="182" y="110" width="38" height="270" rx="10" fill="rgba(250,247,240,0.88)" filter="url(#shadow2)"/>
  <!-- Tool buttons -->
  <rect x="188" y="118" width="26" height="26" rx="7" fill="#c47a5a"/>
  <text x="201" y="135" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle">1</text>
  <rect x="188" y="148" width="26" height="26" rx="7" fill="none" stroke="rgba(120,100,70,0.1)" stroke-width="1"/>
  <rect x="188" y="178" width="26" height="26" rx="7" fill="none" stroke="rgba(120,100,70,0.1)" stroke-width="1"/>
  <rect x="188" y="208" width="26" height="26" rx="7" fill="none" stroke="rgba(120,100,70,0.1)" stroke-width="1"/>
  <line x1="192" y1="244" x2="214" y2="244" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
  <rect x="188" y="252" width="26" height="26" rx="7" fill="none" stroke="rgba(120,100,70,0.1)" stroke-width="1"/>
  <rect x="188" y="282" width="26" height="26" rx="7" fill="none" stroke="rgba(120,100,70,0.1)" stroke-width="1"/>

  <!-- Topbar -->
  <rect x="230" y="58" width="380" height="30" rx="9" fill="rgba(250,247,240,0.88)" filter="url(#shadow2)"/>
  <!-- Color dots -->
  <circle cx="248" cy="73" r="5" fill="#2c2416"/>
  <circle cx="262" cy="73" r="5" fill="#c45a5a"/>
  <circle cx="276" cy="73" r="5" fill="#c47a3a"/>
  <circle cx="290" cy="73" r="5" fill="#6a9c5a"/>
  <circle cx="304" cy="73" r="5" fill="#5a8a9c"/>
  <circle cx="318" cy="73" r="5" fill="#8a6a9c"/>
  <!-- Size dots -->
  <rect x="336" y="68" width="12" height="10" rx="4" fill="none" stroke="rgba(120,100,70,0.12)" stroke-width="0.8"/>
  <rect x="352" y="68" width="12" height="10" rx="4" fill="rgba(120,100,70,0.2)"/>
  <rect x="368" y="68" width="12" height="10" rx="4" fill="none" stroke="rgba(120,100,70,0.12)" stroke-width="0.8"/>
  <rect x="384" y="68" width="12" height="10" rx="4" fill="none" stroke="rgba(120,100,70,0.12)" stroke-width="0.8"/>
  <!-- Export button -->
  <rect x="540" y="64" width="56" height="20" rx="6" fill="#c47a5a"/>
  <text x="568" y="78" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">导出</text>

  <!-- Brand -->
  <rect x="620" y="58" width="148" height="30" rx="9" fill="rgba(250,247,240,0.88)" filter="url(#shadow2)"/>
  <rect x="628" y="64" width="18" height="18" rx="5" fill="#c47a5a"/>
  <text x="637" y="77" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">M</text>
  <text x="658" y="77" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#2c2416">MindNotes</text>
  <rect x="720" y="67" width="28" height="14" rx="4" fill="rgba(196,122,90,0.08)"/>
  <text x="734" y="78" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#c8bba8" text-anchor="middle">v2.2</text>

  <!-- Animated drawing strokes -->
  <g clip-path="url(#canvas-clip)">
    <!-- Stroke 1: smooth curve -->
    <path d="M280,200 Q340,140 420,180 Q500,220 560,160" fill="none" stroke="#2c2416" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="stroke-dasharray" from="0,1000" to="500,0" dur="2.5s" fill="freeze"/>
    </path>

    <!-- Stroke 2: highlight -->
    <path d="M380,240 Q450,200 520,250" fill="none" stroke="#c45a5a" stroke-width="8" stroke-linecap="round" opacity="0.3">
      <animate attributeName="stroke-dasharray" from="0,500" to="250,0" dur="2s" begin="1.5s" fill="freeze"/>
    </path>

    <!-- Shape: rectangle -->
    <rect x="280" y="270" width="100" height="60" rx="3" fill="none" stroke="#6a9c5a" stroke-width="1.5">
      <animate attributeName="stroke-dasharray" from="0,500" to="320,0" dur="1.5s" begin="2.5s" fill="freeze"/>
    </rect>

    <!-- Shape: circle -->
    <circle cx="530" cy="300" r="35" fill="none" stroke="#5a8a9c" stroke-width="1.5">
      <animate attributeName="stroke-dasharray" from="0,300" to="220,0" dur="1.5s" begin="3s" fill="freeze"/>
    </circle>

    <!-- Text block -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4s" fill="freeze"/>
      <rect x="620" y="140" width="140" height="60" rx="8" fill="rgba(250,247,240,0.9)" stroke="rgba(120,100,70,0.08)" stroke-width="1"/>
      <text x="632" y="160" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#2c2416">Hello, MindNotes!</text>
      <text x="632" y="178" font-family="system-ui, sans-serif" font-size="9" fill="#9c8e7a">画布上直接打字</text>
      <text x="632" y="192" font-family="system-ui, sans-serif" font-size="9" fill="#9c8e7a">可拖拽、可缩放</text>
    </g>

    <!-- Arrow -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.5s" fill="freeze"/>
      <line x1="395" y1="300" x2="490" y2="300" stroke="#8a6a9c" stroke-width="1.5" stroke-linecap="round"/>
      <polyline points="482,293 490,300 482,307" fill="none" stroke="#8a6a9c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Status bar -->
  <rect x="230" y="380" width="180" height="16" rx="5" fill="rgba(250,247,240,0.85)" filter="url(#shadow2)"/>
  <circle cx="242" cy="388" r="3" fill="#6a9c5a"/>
  <text x="250" y="392" font-family="system-ui, sans-serif" font-size="8" fill="#9c8e7a">画笔</text>
  <line x1="270" y1="384" x2="270" y2="392" stroke="rgba(120,100,70,0.08)" stroke-width="0.5"/>
  <text x="276" y="392" font-family="system-ui, sans-serif" font-size="8" fill="#9c8e7a">3 元素</text>
  <line x1="310" y1="384" x2="310" y2="392" stroke="rgba(120,100,70,0.08)" stroke-width="0.5"/>
  <text x="316" y="392" font-family="system-ui, sans-serif" font-size="8" fill="#9c8e7a">2 画布</text>
  <line x1="350" y1="384" x2="350" y2="392" stroke="rgba(120,100,70,0.08)" stroke-width="0.5"/>
  <text x="356" y="392" font-family="system-ui, sans-serif" font-size="8" fill="#c47a5a" font-weight="600">100%</text>

  <!-- Hints bar -->
  <rect x="580" y="380" width="188" height="16" rx="5" fill="rgba(250,247,240,0.85)" filter="url(#shadow2)"/>
  <text x="592" y="392" font-family="system-ui, sans-serif" font-size="7" fill="#c8bba8">Ctrl+Z 撤销 · 滚轮缩放 · 0-8 工具 · Del 删除选中</text>
</svg>
