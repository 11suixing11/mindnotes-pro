name: Auto Promotion

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to promote'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - twitter
          - devto

permissions:
  contents: read
  issues: write

jobs:
  promote:
    name: Generate Promotion Content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get release info
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'release') {
              return {
                version: context.payload.release.tag_name,
                body: context.payload.release.body,
                url: context.payload.release.html_url
              };
            }
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            if (releases.length === 0) return null;
            return {
              version: releases[0].tag_name,
              body: releases[0].body,
              url: releases[0].html_url
            };

      - name: Generate social media posts
        id: posts
        run: |
          VERSION="${{ fromJSON(steps.release.outputs.result).version }}"
          URL="${{ fromJSON(steps.release.outputs.result).url }}"

          TWITTER="MindNotes Pro ${VERSION} is here! A local-first whiteboard with only 3 dependencies. Less than 1s load time, zero cloud, zero tracking. Try it: https://11suixing11.github.io/mindnotes-pro/ Source: https://github.com/11suixing11/mindnotes-pro #opensource #react #typescript #webdev"

          DEVTO_TITLE="What is New in MindNotes Pro ${VERSION}"
          DEVTO_TAGS="webdev, react, typescript, opensource, release"

          {
            echo "twitter<<EOF"
            echo "$TWITTER"
            echo "EOF"
            echo "devto_title=$DEVTO_TITLE"
            echo "devto_tags=$DEVTO_TAGS"
          } >> "$GITHUB_OUTPUT"

      - name: Create promotion issue
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ fromJSON(steps.release.outputs.result).version }}';
            const twitter = `${{ steps.posts.outputs.twitter }}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Promotion Checklist for ${version}`,
              body: `## Release ${version} Promotion Checklist

            ### Social Media Posts

            #### Twitter/X
            ${twitter}

            #### Hacker News
            - Submit Show HN

            #### Reddit
            - r/webdev
            - r/opensource
            - r/reactjs

            #### Chinese Platforms
            - V2EX
            - Jike
            - Juejin
            - Zhihu

            #### Dev.to
            - Publish release article

            ### Awesome Lists
            - awesome-react PR
            - awesome-typescript PR
            - awesome-selfhosted PR

            ---
            Auto-generated by promotion workflow
            `,
              labels: ['promotion', 'release']
            });
