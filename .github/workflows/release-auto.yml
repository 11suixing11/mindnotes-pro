name: Auto Release Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run electron:build
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-appimage
          path: release/*.AppImage

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run electron:build
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-exe
          path: release/*.exe

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run electron:build
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-dmg
          path: release/*.dmg

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "${{ github.ref_name }}" \
            artifacts/linux-appimage/*.AppImage \
            artifacts/windows-exe/*.exe \
            artifacts/macos-dmg/*.dmg \
            || true
