name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: .lighthouserc.json
          runs: 3
          temporaryPublicStorage: true
      - name: Comment Lighthouse results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsDir = '.lighthouseci';
            if (!fs.existsSync(resultsDir)) {
              console.log('No Lighthouse results found');
              return;
            }
            const reportFiles = fs.readdirSync(resultsDir)
              .filter(f => f.endsWith('.json') && !f.endsWith('assertion-results.json'));
            if (reportFiles.length === 0) {
              console.log('No Lighthouse report JSON found');
              return;
            }
            const latestReport = reportFiles.sort().pop();
            const report = JSON.parse(
              fs.readFileSync(path.join(resultsDir, latestReport), 'utf8')
            );
            const categories = report.categories;
            const scores = Object.entries(categories)
              .map(([, cat]) => `| ${cat.title} | ${cat.score >= 0.9 ? '🟢' : cat.score >= 0.5 ? '🟡' : '🔴'} ${Math.round(cat.score * 100)} |`)
              .join('\n');
            const body = `## 🔦 Lighthouse CI Results\n\n| Category | Score |\n|----------|-------|\n${scores}\n\n> Ran ${reportFiles.length} audit(s). Full report available in workflow artifacts.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });