name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: .lighthouserc.json
          runs: 3
          temporaryPublicStorage: true
      - name: Comment Lighthouse results on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsDir = '.lighthouseci';
            if (!fs.existsSync(resultsDir)) {
              console.log('No Lighthouse results found');
              return;
            }
            const reports = fs.readdirSync(resultsDir)
              .filter(f => f.endsWith('.json'))
              .map((file) => {
                const fullPath = path.join(resultsDir, file);
                const report = JSON.parse(fs.readFileSync(fullPath, 'utf8'));
                return { file, report };
              })
              .filter(({ report }) => report && report.categories);
            if (reports.length === 0) {
              console.log('No Lighthouse report JSON found');
              return;
            }
            const { report } = reports.sort((a, b) => a.file.localeCompare(b.file)).pop();
            const categories = report.categories;
            const scores = Object.entries(categories)
              .map(([, cat]) => `| ${cat.title} | ${cat.score >= 0.9 ? '🟢' : cat.score >= 0.5 ? '🟡' : '🔴'} ${Math.round(cat.score * 100)} |`)
              .join('\n');
            const body = `## 🔦 Lighthouse CI Results\n\n| Category | Score |\n|----------|-------|\n${scores}\n\n> Ran ${reports.length} audit(s). Full report available in workflow artifacts.`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
