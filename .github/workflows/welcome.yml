name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: >
            👋 Welcome to MindNotes Pro, and thanks for opening your first issue!

            We appreciate your feedback and will take a look soon. In the
            meantime, check out our [README](../../README.md) for project info
            and [CONTRIBUTING.md](../../CONTRIBUTING.md) if you'd like to
            contribute code.
          pr_message: >
            🎉 Welcome to MindNotes Pro, and thank you for your first pull
            request!

            A maintainer will review your PR shortly. Please make sure all CI
            checks pass. Check out our
            [CONTRIBUTING.md](../../CONTRIBUTING.md) for guidelines.
