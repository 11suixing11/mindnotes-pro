name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Package dist archive
        run: tar -czf mindnotes-pro-${{ github.ref_name }}.tar.gz -C dist .

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Strip leading 'v' for CHANGELOG matching
          VERSION_NUM="${VERSION#v}"

          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk -v ver="$VERSION_NUM" '
            /^## \[/ {
              if (found) exit
              gsub(/[\[\]]/, "")
              if ($2 ~ "^"ver) found=1; next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES=$(git log "${{ github.ref_name }}~1..${{ github.ref_name }}" --pretty=format:"- %s" --no-merges 2>/dev/null || echo "See CHANGELOG for details.")
          fi

          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's New in ${{ github.ref_name }}

            ${{ steps.changelog.outputs.body }}

            ---

            **📦 Install**

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd ${{ github.event.repository.name }}
            npm install && npm run dev
            ```

            Or try the **[Live Demo](https://11suixing11.github.io/mindnotes-pro)** ✨

            **[Full Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)** · **[Report Issues](https://github.com/${{ github.repository }}/issues)**
          files: mindnotes-pro-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
