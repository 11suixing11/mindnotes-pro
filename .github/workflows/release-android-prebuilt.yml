name: Release Android APK (Prebuilt)

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'APK 下载链接 (可选，留空则使用构建的)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web
        run: npm run build
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Build APK Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease
      
      - name: Verify APK
        run: |
          echo "=== Looking for APK ==="
          find android/app/build/outputs -name "*.apk" -type f
          echo "=== Release folder ==="
          ls -lh android/app/build/outputs/apk/release/ || echo "Not found"
      
      - name: Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
