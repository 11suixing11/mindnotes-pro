name: Bug Report
description: Report a bug to help us improve
title: '[Bug] '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the information below to help us locate the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the issue
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List steps to reproduce
      placeholder: |
        1. Open '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severely does this bug impact you?
      options:
        - Low - Minor inconvenience
        - Medium - Feature partially broken
        - High - Feature completely broken
        - Critical - Data loss or security issue
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Browser & OS
      description: Provide browser and OS info
      placeholder: 'Chrome 126 / Windows 11'
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MindNotes Pro Version
      description: Version you are using
      placeholder: '3.2.0'
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots if they help
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: Paste browser console errors here
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I can reproduce this issue consistently
          required: false
