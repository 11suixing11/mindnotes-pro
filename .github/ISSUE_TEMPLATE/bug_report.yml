name: Bug Report
description: 提交一个 bug 报告
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量填写以下信息以帮助我们更快定位问题。

  - type: textarea
    id: description
    attributes:
      label: 描述
      description: 请清晰地描述你遇到的问题
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请列出复现此问题的步骤
      placeholder: |
        1. 打开 '...'
        2. 点击 '...'
        3. 滚动到 '...'
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 请描述你期望发生的行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 请描述实际发生了什么
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 浏览器 / 操作系统
      description: 请提供你的浏览器和操作系统信息
      placeholder: "Chrome 126 / Windows 11"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MindNotes Pro 版本
      description: 你使用的 MindNotes Pro 版本号
      placeholder: "3.1.0"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果有截图能帮助说明问题，请在此处附上
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: 控制台错误信息
      description: 如果浏览器控制台有错误信息，请粘贴在此处
      render: shell
    validations:
      required: false