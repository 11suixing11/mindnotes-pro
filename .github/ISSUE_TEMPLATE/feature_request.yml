name: Feature Request
description: 提出一个功能建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请尽量详细描述你的需求。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 请清晰地描述你希望添加的功能
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 请描述该功能的使用场景，以及它如何帮助你
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 建议的实现方式
      description: 如果你有关于如何实现此功能的想法，请在此描述
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 请描述你考虑过的其他替代方案（如有）
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 你认为这个功能的重要程度
      options:
        - Nice to have（锦上添花）
        - Important（重要）
        - Critical（关键）
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他需要补充的信息、截图或参考链接
    validations:
      required: false