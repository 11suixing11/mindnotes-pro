name: Feature Request
description: 提出一个功能建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 请清晰地描述你希望添加的功能
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 请描述该功能的使用场景，以及它如何帮助你
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 请描述你考虑过的其他替代方案（如有）
    validations:
      required: false