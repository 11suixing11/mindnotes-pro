plugins {
    id 'com.android.application'
    // 暂时不使用 Kotlin 插件，保持 Java 兼容性
    // id 'org.jetbrains.kotlin.android'
    // id 'kotlin-parcelize'
}

android {
    namespace 'com.mindnotes.pro'
    compileSdk 36  // AndroidX 要求
    
    defaultConfig {
        applicationId "com.mindnotes.pro"
        minSdk 24
        targetSdk 34
        versionCode 4
        versionName "1.3.2"
        
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        // 现代 Android 最佳实践
        vectorDrawables {
            useSupportLibrary = true
        }
        
        // 启用 AndroidX
        android {
            buildFeatures {
                buildConfig = true
            }
        }
    }
    
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug // 临时使用 debug 签名
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }
    
    // Java 配置 (Capacitor 要求 Java 21)
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    
    // 现代构建特性
    buildFeatures {
        viewBinding = false // 暂时关闭，简化构建
        compose = false
    }
    
    // 打包优化
    packaging {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
            excludes += 'META-INF/DEPENDENCIES'
            excludes += 'META-INF/LICENSE'
            excludes += 'META-INF/LICENSE.txt'
            excludes += 'META-INF/NOTICE'
            excludes += 'META-INF/NOTICE.txt'
        }
    }
    
    // APK 分割优化 (按 ABI)
    splits {
        abi {
            enable true
            reset()
            include 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
            universalApk true
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    // Capacitor Core
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
    
    // AndroidX Core (现代 Android 基础)
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    
    // 启动画面 (Android 12+)
    implementation 'androidx.core:core-splashscreen:1.0.1'
    
    // 生命周期组件 (现代 Android 架构)
    implementation 'androidx.lifecycle:lifecycle-runtime:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-livedata:2.7.0'
    
    // 测试
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
