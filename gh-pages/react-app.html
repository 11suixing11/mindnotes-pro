<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4f46e5">
  <meta name="description" content="MindNotes Pro - 让灵感自由流淌">
  <title>MindNotes Pro - 让灵感自由流淌</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 {
      color: #667eea;
      font-size: 36px;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #6b7280;
      font-size: 18px;
      margin-bottom: 30px;
    }
    .btn-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 30px;
    }
    .btn {
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      display: inline-block;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-secondary {
      background: #f3f4f6;
      color: #1f2937;
    }
    .features {
      text-align: left;
      margin: 30px 0;
      padding: 20px;
      background: #f9fafb;
      border-radius: 10px;
    }
    .feature {
      margin: 10px 0;
      padding: 10px;
      border-left: 3px solid #667eea;
      padding-left: 15px;
    }
    .feature strong {
      color: #1f2937;
    }
    .feature span {
      color: #6b7280;
    }
    .footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
      color: #9ca3af;
      font-size: 14px;
    }
    .footer a {
      color: #667eea;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    @media (max-width: 600px) {
      .container { padding: 20px; }
      h1 { font-size: 28px; }
      .btn-group { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 MindNotes Pro</h1>
    <p class="subtitle">让灵感自由流淌</p>

    <div class="btn-group">
      <a href="/app.html" class="btn btn-primary">🚀 开始使用</a>
      <a href="https://github.com/11suixing11/mindnotes-pro" class="btn btn-secondary">📦 GitHub</a>
    </div>

    <div class="features">
      <div class="feature">
        <strong>✨ 标准版</strong><br>
        <span>30KB, 0.5s 加载，100% 兼容所有浏览器</span>
      </div>
      <div class="feature">
        <strong>🚀 高级版</strong><br>
        <span>React 版本，完整功能，命令面板 + 智能模板</span>
      </div>
      <div class="feature">
        <strong>📱 全平台支持</strong><br>
        <span>Web / Windows / macOS / Linux / Android / iOS</span>
      </div>
      <div class="feature">
        <strong>💾 自动保存</strong><br>
        <span>本地优先存储，永不丢失</span>
      </div>
      <div class="feature">
        <strong>🔒 隐私保护</strong><br>
        <span>MIT License 免费开源，不收集用户数据</span>
      </div>
    </div>

    <div class="footer">
      <p>Made with ❤️ by <a href="https://github.com/11suixing11">11suixing11</a></p>
      <p>Licensed under <a href="https://opensource.org/licenses/MIT">MIT License</a></p>
    </div>
  </div>

  <script>
    // 简单的欢迎动画
    document.addEventListener('DOMContentLoaded', () => {
      console.log('MindNotes Pro loaded!')
      console.log('Standard Edition: Ready')
      console.log('Advanced Edition: /app.html')
    })
  </script>
</body>
</html>
