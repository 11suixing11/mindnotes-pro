<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindNotes Pro - 高级版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #f9fafb;
      overflow: hidden;
    }
    .banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 20px;
      text-align: center;
      z-index: 1000;
    }
    .banner a {
      color: white;
      text-decoration: underline;
      margin-left: 10px;
    }
    .content {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
    }
    .message {
      text-align: center;
      padding: 40px;
    }
    .message h2 {
      color: #667eea;
      margin-bottom: 20px;
    }
    .message p {
      color: #6b7280;
      margin: 10px 0;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
    .btn:hover {
      background: #764ba2;
    }
  </style>
</head>
<body>
  <div class="banner">
    🚀 MindNotes Pro 高级版（开发中）
    <a href="/">← 返回标准版</a>
  </div>
  
  <div class="content">
    <div class="message">
      <h2>高级版即将推出</h2>
      <p>React 版本正在优化中</p>
      <p>预计发布时间：2026-03-25</p>
      <p style="margin-top: 30px; font-size: 14px; color: #9ca3af;">
        现在可以使用标准版，功能完整，性能优异
      </p>
      <a href="/" class="btn">使用标准版</a>
      <a href="/test.html" class="btn" style="background: #f3f4f6; color: #1f2937; margin-left: 10px;">测试纯 HTML 版</a>
    </div>
  </div>
</body>
</html>
